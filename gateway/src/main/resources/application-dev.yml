spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:erp_tlm_2021}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:erp_tlm_2021}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
    locations: classpath:db/migration
    baseline-version: 0
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

consul:
  base-url: http://${CONSUL_HOST:localhost}:${CONSUL_PORT:8500}
  token: ${GATEWAY_TOKEN:dev-token}
  datacenter: ${CONSUL_DATACENTER:dc1}

logging:
  file:
    path: ./logs
  level:
    com.walrex.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    org.springframework.r2dbc: INFO
